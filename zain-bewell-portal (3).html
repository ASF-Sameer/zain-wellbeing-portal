<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zain — BE WELL Crisis Support Portal</title>
<meta name="description" content="A crisis support sanctuary for Zain employees. Standing together during difficult times.">
<meta property="og:title" content="Zain BE WELL — Crisis Support Portal">
<meta property="og:description" content="Standing together. A definitive support structure for our Zain family.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Zain:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #0B101E;
  --dark: #0F172A;
  --magenta: #E40068;
  --cyan: #00B5E2;
  --bg: #F8FAFC;
  --white: #FFFFFF;
  --border: #E2E8F0;
  --text: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  --ease: cubic-bezier(0.85, 0, 0.15, 1);
}

html { scroll-behavior: smooth; overflow-x: hidden; }

body {
  font-family: 'Zain', 'Inter', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.loader {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--navy);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  transition: transform 0.8s var(--ease);
}
.loader.exit { transform: translateY(-100%); }
.loader-logo {
  height: 56px;
  width: auto;
  opacity: 0;
  transform: translateY(12px);
  animation: loaderFadeUp 0.7s var(--ease) 0.15s forwards;
}
.loader-divider {
  width: 48px;
  height: 1px;
  background: rgba(255,255,255,0.15);
  margin: 24px 0;
  opacity: 0;
  transform: scaleX(0);
  animation: loaderScaleIn 0.4s var(--ease) 0.5s forwards;
}
.loader-title {
  font-family: 'Zain', sans-serif;
  font-size: clamp(2rem, 6vw, 3rem);
  font-weight: 700;
  color: var(--magenta);
  letter-spacing: -0.02em;
  opacity: 0;
  transform: translateY(10px);
  animation: loaderFadeUp 0.7s var(--ease) 0.65s forwards;
}
.loader-progress-track {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: rgba(255,255,255,0.05);
}
.loader-progress-bar {
  height: 100%;
  background: var(--magenta);
  transform-origin: left;
  transform: scaleX(0);
}

@keyframes loaderFadeUp {
  to { opacity: 1; transform: translateY(0); }
}
@keyframes loaderScaleIn {
  to { opacity: 1; transform: scaleX(1); }
}

#app-wrapper {
  background: var(--white);
  min-height: 100vh;
  position: relative;
  transform-origin: top center;
  transition: transform 0.65s var(--ease), filter 0.65s var(--ease), border-radius 0.65s var(--ease);
  opacity: 0;
}
#app-wrapper.ready { opacity: 1; }
#app-wrapper.scaled {
  transform: scale(0.95);
  filter: blur(4px) brightness(0.75);
  border-radius: 24px;
  pointer-events: none;
}

.header {
  padding: 32px 16px 40px;
}
.header-inner { max-width: 1152px; margin: 0 auto; }

.logo-lockup {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  opacity: 0;
  transform: translateY(10px);
}
.logo-lockup.visible {
  animation: fadeUp 0.5s var(--ease) 0.05s forwards;
}
.logo-lockup img { height: 40px; width: auto; filter: invert(1); }
.logo-divider { width: 1px; height: 24px; background: var(--border); }
.logo-bewell {
  font-family: 'Zain', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.3em;
  color: var(--magenta);
  text-transform: uppercase;
}

.hero-title {
  font-family: 'Zain', sans-serif;
  font-size: clamp(1.8rem, 7vw, 4rem);
  font-weight: 700;
  color: var(--text);
  line-height: 1.08;
  letter-spacing: -0.02em;
  opacity: 0;
  transform: translateY(16px);
}
.hero-title.visible { animation: fadeUp 0.6s var(--ease) 0.1s forwards; }

.hero-accent {
  width: 48px;
  height: 3px;
  background: var(--magenta);
  margin: 16px 0;
  opacity: 0;
  transform: scaleX(0);
  transform-origin: left;
}
.hero-accent.visible { animation: loaderScaleIn 0.5s var(--ease) 0.25s forwards; }

.hero-subtitle {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 560px;
  line-height: 1.6;
  opacity: 0;
  transform: translateY(12px);
}
.hero-subtitle.visible { animation: fadeUp 0.6s var(--ease) 0.35s forwards; }

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.grid-section { padding: 0 16px 96px; }
.grid-section-inner { max-width: 1152px; margin: 0 auto; }

.editorial-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.grid-card {
  position: relative;
  background: var(--white);
  padding: 20px;
  text-align: left;
  cursor: pointer;
  border: none;
  font-family: inherit;
  width: 100%;
  display: block;
  transition: background 0.3s ease, border-color 0.3s ease;
  outline: none;
}
.grid-card:hover { background: #FAFBFC; }
.grid-card:focus-visible { box-shadow: inset 0 0 0 2px var(--cyan); }
.grid-card.dark-card { background: var(--dark); }
.grid-card.dark-card:hover { background: #1E293B; }
.grid-card.left-border-cyan { border-left: 4px solid var(--cyan); }
.grid-card.left-border-magenta { border-left: 4px solid var(--magenta); }

.grid-card.morph-source { opacity: 0; }

.card-inner { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.card-content { flex: 1; min-width: 0; }
.card-label-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.card-icon { width: 16px; height: 16px; flex-shrink: 0; }
.card-label {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-muted);
}
.dark-card .card-label { color: #64748B; }
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  margin-bottom: 6px;
  line-height: 1.3;
}
.dark-card .card-title { color: var(--white); }
.card-desc {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-muted);
}
.dark-card .card-desc { color: #94A3B8; }
.card-arrow {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 2px;
  color: #CBD5E1;
  transition: color 0.3s, transform 0.3s;
}
.grid-card:hover .card-arrow { color: var(--text); transform: translateX(2px); }
.dark-card .card-arrow { color: #475569; }
.dark-card:hover .card-arrow { color: var(--white); }

.backdrop {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.5);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s var(--ease);
}
.backdrop.active { opacity: 1; pointer-events: auto; }

.modal-container {
  position: fixed;
  inset: 0;
  z-index: 110;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  pointer-events: none;
  padding: 0;
}
.modal-container.active { pointer-events: auto; }

.modal {
  position: absolute;
  background: var(--white);
  width: 100%;
  min-height: 100vh;
  border: none;
  opacity: 0;
  pointer-events: none;
  overflow: hidden;
}
.modal.morphing { opacity: 1; pointer-events: auto; }
.modal.expanded {
  opacity: 1;
  pointer-events: auto;
  overflow: visible;
}

.modal-header {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--white);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  opacity: 0;
  transition: opacity 0.35s var(--ease);
}
.modal.expanded .modal-header { opacity: 1; }
.modal-header-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.modal-header-icon { width: 16px; height: 16px; flex-shrink: 0; }
.modal-header-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.modal-close {
  min-width: 44px;
  min-height: 44px;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  transition: color 0.2s;
  flex-shrink: 0;
  margin-right: -4px;
}
.modal-close:hover { color: var(--text); }
.modal-close svg { width: 20px; height: 20px; }

.modal-body {
  padding: 20px 16px 80px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.4s var(--ease) 0.15s, transform 0.4s var(--ease) 0.15s;
}
.modal.expanded .modal-body { opacity: 1; transform: translateY(0); }

.section-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  display: block;
  margin-bottom: 12px;
}
.section-divider { height: 1px; background: var(--border); margin: 24px 0; }

.guidance-card { border-bottom: 1px solid var(--border); padding-bottom: 16px; margin-bottom: 16px; }
.guidance-card:last-child { border-bottom: none; padding-bottom: 0; margin-bottom: 0; }
.guidance-card h4 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.guidance-card p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

.info-box {
  border: 1px solid var(--border);
  background: var(--bg);
  padding: 16px;
}
.info-box + .info-box { margin-top: 12px; }
.info-box p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.info-box a { font-weight: 600; color: var(--text); text-decoration: underline; text-underline-offset: 2px; transition: color 0.2s; }
.info-box a:hover { color: var(--cyan); }

.whatsapp-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--dark);
  color: var(--white);
  padding: 10px 16px;
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: -0.02em;
  text-decoration: none;
  margin-top: 12px;
  transition: background 0.2s;
}
.whatsapp-btn:hover { background: #1E293B; }
.whatsapp-btn svg { width: 16px; height: 16px; }

.blockquote-box {
  border-left: 2px solid var(--magenta);
  padding: 8px 0 8px 16px;
}
.blockquote-box.orange { border-left-color: #EA580C; }
.blockquote-box p { font-size: 13px; color: var(--text-secondary); font-style: italic; line-height: 1.6; }

.arabic-box {
  border: 1px solid var(--border);
  background: var(--bg);
  padding: 16px 20px;
}
.arabic-text {
  font-size: 18px;
  line-height: 1.6;
  color: var(--text);
  text-align: right;
  direction: rtl;
  margin-bottom: 8px;
}
.arabic-translation { font-size: 13px; color: var(--text-muted); font-style: italic; line-height: 1.6; }
.arabic-ref { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); margin-top: 12px; }

.step-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.step-num {
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  font-size: 10px;
  font-weight: 700;
  color: var(--text-muted);
  flex-shrink: 0;
}
.step-text { font-size: 13px; color: var(--text-secondary); }

.iframe-wrapper {
  position: relative;
  width: 100%;
  height: 400px;
  overflow: hidden;
  background: var(--white);
  border: 1px solid var(--border);
}
.iframe-loader {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: var(--white);
  transition: opacity 0.5s var(--ease);
}
.iframe-loader.hidden { opacity: 0; pointer-events: none; }
.spin-loader {
  width: 32px;
  height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.iframe-loader span { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text-muted); }
.iframe-wrapper iframe {
  width: 100%;
  height: 100%;
  border: none;
  opacity: 0;
  transition: opacity 0.5s var(--ease);
}
.iframe-wrapper iframe.loaded { opacity: 1; }

.form-placeholder {
  border: 1px solid var(--border);
  background: var(--bg);
}
.form-placeholder-header {
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
}
.form-placeholder-header span { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); }
.form-placeholder-body { padding: 16px; }
.form-field { margin-bottom: 16px; }
.form-field label { font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-muted); display: block; margin-bottom: 8px; }
.form-field-line { height: 40px; border-bottom: 2px solid var(--border); }
.form-submit {
  height: 40px;
  background: #121626;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 8px;
}
.form-submit span { color: var(--white); font-size: 10px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; }
.form-placeholder-footer { border-top: 1px solid var(--border); padding: 12px 16px; }
.form-placeholder-footer span { font-size: 10px; color: var(--text-muted); letter-spacing: 0.05em; }

.sticky-footer {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 90;
  background: var(--white);
  border-top: 1px solid var(--border);
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.5s var(--ease) 0.3s, transform 0.5s var(--ease) 0.3s;
}
.sticky-footer.visible { opacity: 1; transform: translateY(0); }
.sticky-footer.hidden-footer { opacity: 0; transform: translateY(20px); pointer-events: none; }
.footer-inner {
  max-width: 1152px;
  margin: 0 auto;
  padding: 10px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.footer-email { font-size: 12px; color: var(--text-muted); }
.footer-email a { font-weight: 600; color: var(--text); text-decoration: underline; text-underline-offset: 2px; transition: color 0.2s; }
.footer-email a:hover { color: var(--cyan); }
.footer-kcc {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--dark);
  color: var(--white);
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  font-family: inherit;
  letter-spacing: -0.02em;
  text-decoration: none;
  flex-shrink: 0;
  transition: background 0.2s;
}
.footer-kcc:hover { background: #1E293B; }

.mobile-fab {
  display: none;
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 120;
  background: var(--dark);
  padding: 12px 16px;
}
.mobile-fab a {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  color: var(--white);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
}
.mobile-fab svg { width: 18px; height: 18px; }

.checklist-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; cursor: pointer; -webkit-user-select: none; user-select: none; }
.checklist-box {
  width: 18px;
  height: 18px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  margin-top: 2px;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
}
.checklist-item.checked .checklist-box { border-color: var(--dark); background: var(--dark); }
.checklist-box::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 5px;
  width: 5px;
  height: 9px;
  border: solid var(--white);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  opacity: 0;
  transition: opacity 0.2s;
}
.checklist-item.checked .checklist-box::after { opacity: 1; }
.checklist-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.checklist-item.checked .checklist-text { text-decoration: line-through; color: var(--text-muted); }

@media (min-width: 640px) {
  .header { padding: 64px 32px 80px; }
  .grid-section { padding: 0 32px 80px; }
  .logo-lockup img { height: 50px; }
  .logo-lockup { gap: 16px; margin-bottom: 56px; }
  .logo-divider { height: 28px; }
  .logo-bewell { font-size: 18px; }
  .hero-accent { width: 64px; height: 4px; margin: 24px 0; }
  .hero-subtitle { font-size: 18px; }
  .editorial-grid { grid-template-columns: repeat(2, 1fr); }
  .span-2 { grid-column: span 2; }
  .grid-card { padding: 24px 32px; }
  .card-label-row { gap: 12px; margin-bottom: 16px; }
  .card-icon { width: 20px; height: 20px; }
  .card-label { font-size: 11px; }
  .card-title { font-size: 18px; margin-bottom: 8px; }
  .card-desc { font-size: 14px; }
  .card-arrow { width: 32px; height: 32px; margin-top: 4px; }
  .modal {
    position: relative;
    max-width: 672px;
    min-height: 0;
    border: 1px solid var(--border);
    margin: 48px auto;
  }
  .modal-container { padding: 0 16px; }
  .modal-header { padding: 20px 32px; }
  .modal-header-icon { width: 20px; height: 20px; }
  .modal-header-title { font-size: 18px; }
  .modal-body { padding: 24px 32px 24px; }
  .guidance-card h4 { font-size: 14px; margin-bottom: 6px; }
  .guidance-card p { font-size: 14px; }
  .info-box p { font-size: 14px; }
  .whatsapp-btn { font-size: 14px; }
  .iframe-wrapper { height: 600px; }
  .footer-inner { padding: 12px 32px; }
  .footer-email { font-size: 14px; }
  .footer-kcc { padding: 10px 20px; font-size: 14px; gap: 8px; }
}

@media (min-width: 1024px) {
  .editorial-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 639px) {
  .modal-container.active .mobile-fab { display: block; }
  .footer-email-full { display: none; }
}
@media (min-width: 640px) {
  .footer-email-short { display: none; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .loader { display: none; }
  #app-wrapper { opacity: 1; }
  .logo-lockup, .hero-title, .hero-accent, .hero-subtitle { opacity: 1; transform: none; }
  .sticky-footer { opacity: 1; transform: none; }
}
</style>
</head>
<body>

  function flipOpen(cardEl, cardId) {
    if (isOpen) return;
    isOpen = true;
    activeCardEl = cardEl;

    var data = CARDS[cardId];
    modalTitle.textContent = data.title;
    modalIcon.innerHTML = data.icon;
    modalBody.innerHTML = CONTENT[cardId]();

    var first = cardEl.getBoundingClientRect();

    cardEl.classList.add('morph-source');
    appWrapper.classList.add('scaled');
    stickyFooter.classList.add('hidden-footer');
    backdrop.classList.add('active');
    modalContainer.classList.add('active');

    var isMobile = window.innerWidth < 640;

    if (isMobile) {
      modal.style.position = 'fixed';
      modal.style.top = '0';
      modal.style.left = '0';
      modal.style.width = '100%';
      modal.style.height = '100%';
      modal.style.maxWidth = 'none';
      modal.style.margin = '0';
      modal.style.borderRadius = '0';
      modal.style.border = 'none';
    } else {
      modal.style.position = 'relative';
      modal.style.maxWidth = '672px';
      modal.style.width = '100%';
      modal.style.height = '';
      modal.style.minHeight = '0';
      modal.style.margin = '48px auto';
      modal.style.border = '1px solid var(--border)';
      modal.style.borderRadius = '0';
    }

    modal.style.opacity = '';
    modal.classList.add('morphing');

    var last = modal.getBoundingClientRect();

    var dx = first.left - last.left;
    var dy = first.top - last.top;
    var sw = first.width / last.width;
    var sh = first.height / last.height;

    modal.style.transformOrigin = 'top left';
    modal.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) scale(' + sw + ', ' + sh + ')';

    modal.offsetHeight;

    modal.style.transition = 'transform ' + MORPH_DURATION + 'ms ' + EASE;
    modal.style.transform = 'translate(0, 0) scale(1, 1)';

    setTimeout(function() {
      modal.classList.remove('morphing');
      modal.classList.add('expanded');
      modal.style.transition = '';
      modal.style.transform = '';
      modal.style.transformOrigin = '';
      document.body.style.overflow = 'hidden';
      initChecklists();
      modalClose.focus();
    }, MORPH_DURATION + 50);
  }

  function flipClose() {
    if (!isOpen || !activeCardEl) return;

    modal.classList.remove('expanded');
    modal.classList.add('morphing');

    var last = modal.getBoundingClientRect();
    var first = activeCardEl.getBoundingClientRect();

    var dx = first.left - last.left;
    var dy = first.top - last.top;
    var sw = first.width / last.width;
    var sh = first.height / last.height;

    modal.style.transformOrigin = 'top left';
    modal.style.transform = 'translate(0, 0) scale(1, 1)';
    modal.offsetHeight;

    modal.style.transition = 'transform ' + MORPH_DURATION + 'ms ' + EASE;
    modal.style.transform = 'translate(' + dx + 'px, ' + dy + 'px) scale(' + sw + ', ' + sh + ')';

    appWrapper.classList.remove('scaled');
    stickyFooter.classList.remove('hidden-footer');
    backdrop.classList.remove('active');

    setTimeout(function() {
      modal.classList.remove('morphing');
      modal.style.transition = '';
      modal.style.transform = '';
      modal.style.transformOrigin = '';
      modal.style.opacity = '0';
      modalContainer.classList.remove('active');
      activeCardEl.classList.remove('morph-source');
      activeCardEl.focus();
      document.body.style.overflow = '';
      isOpen = false;
      activeCardEl = null;
    }, MORPH_DURATION + 50);
  }

  document.querySelectorAll('.grid-card').forEach(function(card) {
    card.addEventListener('click', function() {
      flipOpen(this, this.dataset.card);
    });
  });

  modalClose.addEventListener('click', flipClose);
  backdrop.addEventListener('click', flipClose);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && isOpen) flipClose();
    if (e.key === 'Tab' && isOpen) {
      var focusable = modal.querySelectorAll('a[href], button, textarea, input, select, [tabindex]:not([tabindex="-1"])');
      if (focusable.length === 0) { e.preventDefault(); return; }
      var first = focusable[0];
      var last = focusable[focusable.length - 1];
      if (e.shiftKey) {
        if (document.activeElement === first) { e.preventDefault(); last.focus(); }
      } else {
        if (document.activeElement === last) { e.preventDefault(); first.focus(); }
      }
    }
  });

  function initChecklists() {
    document.querySelectorAll('.checklist-item').forEach(function(item) {
      item.setAttribute('role', 'checkbox');
      item.setAttribute('tabindex', '0');
      item.setAttribute('aria-checked', 'false');
      function toggle(el) {
        var isChecked = el.classList.toggle('checked');
        el.setAttribute('aria-checked', isChecked ? 'true' : 'false');
      }
      item.addEventListener('click', function() { toggle(this); });
      item.addEventListener('keydown', function(e) {
        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); toggle(this); }
      });
    });
  }

})();
</script>
